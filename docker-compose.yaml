services: 
  postgres-db: 
    image: postgres
    restart: unless-stopped
    container_name: sudoku_postgres
    environment: 
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3666:3666"
    depends_on: 
      postgres-db:
        condition: service_healthy
    restart: unless-stopped
    container_name: sudoku_backend

  frontend-spa:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    restart: unless-stopped
    depends_on:
      - backend-api
    container_name: sudoku_frontend

volumes: 
  postgres_data:
